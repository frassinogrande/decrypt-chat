<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <link
            rel="icon"
            type="image/png"
            href="%sveltekit.assets%/favicon-96x96.png"
            sizes="96x96"
        />
        <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
        <link rel="shortcut icon" href="%sveltekit.assets%/favicon.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Decrypt Chat</title>

        <link
            rel="preload"
            href="%sveltekit.assets%/fonts/open-sans-latin.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <link rel="stylesheet" href="%sveltekit.assets%/fonts/open-sans.css" />

        <meta http-equiv="Referrer-Policy" content="no-referrer" />
        <meta http-equiv="X-Content-Type-Options" content="nosniff" />

        <meta
            name="description"
            content="Decentralized, privacy-first chat application with end-to-end encryption"
        />
        <meta name="theme-color" media="(prefers-color-scheme: light)" content="#006de2" />
        <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121212" />
        <link rel="manifest" href="%sveltekit.assets%/manifest.json" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="%sveltekit.assets%/apple-touch-icon.png"
        />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="apple-mobile-web-app-title" content="Decrypt Chat" />

        <script>
            try {
                var t = JSON.parse(
                    localStorage.getItem('profile-settings') || '{}'
                ).themePreference;
                if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
                else if (t === 'light')
                    document.documentElement.setAttribute('data-theme', 'light');
                if (t === 'dark' || t === 'light') {
                    var c = t === 'dark' ? '#121212' : '#006de2';
                    var metas = document.querySelectorAll('meta[name="theme-color"]');
                    for (var i = 0; i < metas.length; i++) metas[i].setAttribute('content', c);
                }
            } catch (e) {}
        </script>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
